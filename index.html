<!DOCTYPE html>
<html>
<head>
  <title>Infinite Anime</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      background: #111827;
      padding: 15px;
      font-size: 24px;
      color: #f43f5e;
    }

    input {
      padding: 10px;
      width: 70%;
      margin: 10px;
    }

    button {
      padding: 10px;
      background: #f43f5e;
      border: none;
      color: white;
      cursor: pointer;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #1f2937;
      margin: 10px;
      width: 200px;
      border-radius: 10px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    video {
      width: 80%;
      margin-top: 20px;
    }

    .ad {
      background: #222;
      padding: 10px;
      margin: 10px;
    }
  </style>
</head>

<body>

<header>🔥 Infinite Anime</header>

<input id="search" placeholder="Search anime...">
<button onclick="search()">Search</button>

<div id="anime" class="grid"></div>

<h2>Upload (Admin)</h2>
<input id="title" placeholder="Title"><br>
<input id="url" placeholder="Video URL"><br>
<input id="key" placeholder="Admin key"><br>
<button onclick="upload()">Upload</button>

<h2>Videos</h2>
<div id="videos"></div>

<script>

// SEARCH ANIME (images + info)
async function search() {
  const q = document.getElementById("search").value;
  const res = await fetch("/api/search?q=" + q);
  const data = await res.json();

  const div = document.getElementById("anime");
  div.innerHTML = "";

  data.slice(0, 8).forEach(a => {
    div.innerHTML += `
      <div class="card">
        <img src="${a.images.jpg.image_url}">
        <h3>${a.title}</h3>
      </div>
    `;
  });
}

// LOAD VIDEOS
async function loadVideos() {
  const res = await fetch("/api/videos");
  const data = await res.json();

  const div = document.getElementById("videos");
  div.innerHTML = "";

  data.forEach(v => {
    div.innerHTML += `
      <div>
        <h3>${v.title}</h3>

        <div class="ad">Ad Space</div>

        <video controls src="${v.url}"></video>

        <div class="ad">Ad Space</div>
      </div>
    `;
  });
}

// UPLOAD VIDEO
async function upload() {
  const title = document.getElementById("title").value;
  const url = document.getElementById("url").value;
  const key = document.getElementById("key").value;

  await fetch("/api/upload", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ title, url, key })
  });

  alert("Uploaded!");
  loadVideos();
}

loadVideos();

</script>

</body>
</html>
