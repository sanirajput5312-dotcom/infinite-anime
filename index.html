<!DOCTYPE html>
<html>
<head>
  <title>Infinite Anime</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      background: #111827;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #f43f5e;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .card {
      background: #1f2937;
      border-radius: 10px;
      width: 200px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .card h3 {
      margin: 10px;
    }

    .card p {
      margin: 0 10px 10px;
      color: #9ca3af;
    }
  </style>
</head>

<body>

<header>🔥 Infinite Anime</header>

<div class="container">

  <div class="card">
    <img src="https://wallpapercave.com/wp/wp1811240.jpg">
    <h3>Naruto</h3>
    <p>Episodes: 220</p>
  </div>

  <div class="card">
    <img src="https://wallpapercave.com/wp/wp4327833.jpg">
    <h3>Attack on Titan</h3>
    <p>Seasons: 4</p>
  </div>

  <div class="card">
    <img src="https://wallpapercave.com/wp/wp4923992.jpg">
    <h3>Demon Slayer</h3>
    <p>Popular Anime</p>
  </div>

</div>

</body>
</html>
