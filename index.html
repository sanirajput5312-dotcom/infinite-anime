<!DOCTYPE html>
<html>
<head>
  <title>Infinite Anime</title>

  <style>
    body { margin:0; font-family:Arial; background:#0b0f19; color:white; }
    header { display:flex; justify-content:space-between; padding:15px; background:#111; }
    header h1 { color:#ff4757; }

    input { padding:8px; border-radius:5px; border:none; }

    .hero {
      height:300px;
      background:url('https://images.unsplash.com/photo-1608889175123-4b8b1b8a4f42') center/cover;
      display:flex;
      align-items:end;
      padding:20px;
      font-size:30px;
    }

    .row { padding:20px; }
    .scroll { display:flex; overflow-x:auto; gap:10px; }

    .card {
      min-width:150px;
      background:#1f2937;
      border-radius:10px;
      overflow:hidden;
      cursor:pointer;
    }

    .card img { width:100%; height:220px; object-fit:cover; }

    #modal {
      display:none;
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      justify-content:center;
      align-items:center;
    }

    #modalContent {
      background:#111;
      padding:20px;
      width:80%;
    }

    video { width:100%; }
  </style>
</head>

<body>

<header>
  <h1>🔥 Infinite</h1>
  <input id="search" placeholder="Search..." oninput="search()">
</header>

<div class="hero">Watch Anime 🎬</div>

<div class="row">
  <h2>Trending</h2>
  <div class="scroll" id="trending"></div>
</div>

<!-- Modal -->
<div id="modal">
  <div id="modalContent">
    <h2 id="title"></h2>
    <p id="desc"></p>
    <video id="video" controls></video>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

let animeData = [];

// Load anime
async function load() {
  const res = await fetch("/api/search?q=naruto");
  const data = await res.json();

  animeData = data;
  render(animeData);
}

function render(list) {
  const div = document.getElementById("trending");
  div.innerHTML = "";

  list.forEach(a => {
    div.innerHTML += `
      <div class="card" onclick="openModal(${a.id})">
        <img src="${a.coverImage.large}">
      </div>
    `;
  });
}

// Search
async function search() {
  const val = document.getElementById("search").value;

  const res = await fetch("/api/search?q=" + val);
  const data = await res.json();

  animeData = data;
  render(animeData);
}

// Your video links
const videoMap = {
  20: "https://www.w3schools.com/html/mov_bbb.mp4"
};

function openModal(id) {
  const anime = animeData.find(a => a.id === id);

  document.getElementById("modal").style.display = "flex";
  document.getElementById("title").innerText = anime.title.romaji;
  document.getElementById("desc").innerHTML = anime.description || "";

  if (videoMap[id]) {
    document.getElementById("video").src = videoMap[id];
  } else {
    document.getElementById("video").src = "";
  }
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

load();

</script>

</body>
</html>
